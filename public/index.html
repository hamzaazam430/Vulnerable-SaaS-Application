<!DOCTYPE html>
<html>
<head>
  <title>Vuln SaaS</title>
</head>
<body>

<h2>Upload File</h2>

<input type="file" id="fileInput" />
<button onclick="uploadFile()">Upload</button>

<div id="uploadedFiles"></div>

<hr>

<h2>Add Comment</h2>

<textarea id="commentInput" placeholder="Enter comment"></textarea><br>
<button onclick="submitComment()">Submit</button>

<hr>

<h2>Comments</h2>
<div id="comments"></div>

<script>
  const token = localStorage.getItem("token");
  const API_URL = "http://localhost:3000";

  function loadComments() {
    fetch(API_URL + "/comments/1", {
      headers: {
        "Authorization": "Bearer " + token
      }
    })
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("comments");
      container.innerHTML = "";

      data.forEach(comment => {
        const div = document.createElement("div");

        // ❌ VULNERABLE
        div.innerHTML = comment.content;

        container.appendChild(div);
      });
    });
  }

  function submitComment() {
    const content = document.getElementById("commentInput").value;

    fetch(API_URL + "/comments", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        content,
        taskId: 1
      })
    })
    .then(res => res.json())
    .then(() => {
      loadComments(); // refresh comments
    });
  }

  function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if (!file) {
      alert("Select a file first");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);

    fetch(API_URL + "/files/upload", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token
      },
      body: formData
    })
    .then(res => {
      console.log("Upload status:", res.status);
      return res.json();
    })
    .then(data => {
      console.log("Upload response:", data);

      // show uploaded file
      const container = document.getElementById("uploadedFiles");

      const link = document.createElement("a");
      link.href = API_URL + "/files/" + data.filename;
      link.innerText = data.filename;
      link.target = "_blank";

      container.appendChild(link);
      container.appendChild(document.createElement("br"));
    })
    .catch(err => console.error("Upload error:", err));
  }

  // initial load
  loadComments();
</script>

</body>
</html>
